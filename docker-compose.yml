# docker-compose.yml
services:
  db:
    image: pgvector/pgvector:pg15
    container_name: pg_starter_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    # API keys and secrets are read directly from backend/.env
    # No need to duplicate them in the root .env
    env_file:
      - ./backend/.env
    environment:
      # Database — override backend/.env values with Docker service names
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app_db
      POSTGRES_SERVER: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
      # Fixed config — doesn't change between environments
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_CHAT_MODEL: gpt-4o-mini
      ZHIPUAI_BASE_URL: https://open.bigmodel.cn/api/paas/v4/
      ZHIPUAI_EMBEDDING_MODEL: embedding-3
      ZHIPUAI_CHAT_MODEL: glm-4.5
      VOYAGE_BASE_URL: https://api.voyageai.com/v1/
      VOYAGE_EMBEDDING_MODEL: voyage-4-lite
      GOOGLE_REDIRECT_URI: http://localhost:3000/auth/callback/google
      # RAG Configuration
      CHUNK_MIN_TOKENS: 500
      CHUNK_MAX_TOKENS: 800
      CHUNK_OVERLAP_RATIO: 0.2
      TOP_K_RESULTS: 10
      SIMILARITY_THRESHOLD: 0.2
      # Document Processing
      MAX_FILE_SIZE_MB: 10
      SUPPORTED_FILE_EXTENSIONS: pdf,docx,xlsx,xls,pptx,txt,md
      # Rate Limiting
      MAX_UPLOADS_PER_MINUTE: 10
      MAX_CHAT_QUERIES_PER_MINUTE: 60
      # Redis — cross-worker WebSocket notifications
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextjs_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  redis:
    image: redis:7-alpine
    container_name: smart_docs_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
